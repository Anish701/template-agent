apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent
  labels:
    app: agent
    component: agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent
  minReplicas: 2  # HA baseline - handles ~20-40 concurrent users
  maxReplicas: 10  # Peak capacity - handles ~100-150 concurrent users
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Scale up when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75  # Scale up when memory > 75%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60  # Wait 60s before scaling up
      policies:
        - type: Percent
          value: 50  # Scale up by 50% (1→2, 2→3, 4→6)
          periodSeconds: 60
        - type: Pods
          value: 2  # Or add 2 pods at once
          periodSeconds: 60
      selectPolicy: Max  # Use whichever policy scales faster
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5min before scaling down
      policies:
        - type: Percent
          value: 25  # Scale down by 25% at a time
          periodSeconds: 60
        - type: Pods
          value: 1  # Or remove 1 pod at once
          periodSeconds: 180
      selectPolicy: Min  # Use whichever policy scales slower (conservative)
