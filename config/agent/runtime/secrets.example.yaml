# Required Secrets
#
# These are NOT stored here — this file documents what secrets the agent needs.
# All secrets come from OpenShift Secrets mounted as environment variables.
#
# To deploy: create an OpenShift Secret with these keys and reference them
# in your deployment manifest (deployment/overlays/openshift/secret-patch.yaml).
#
# NEVER put actual values in this file. This is a reference only.

# --- Google Cloud (model access via Vertex AI) ---
google:
  # Service account JSON for Vertex AI (Gemini + Claude models)
  # Env var: GOOGLE_APPLICATION_CREDENTIALS_CONTENT
  - GOOGLE_APPLICATION_CREDENTIALS_CONTENT

# --- Database (PostgreSQL — checkpointer + memory store) ---
database:
  - POSTGRES_HOST               # default: pgvector
  - POSTGRES_PORT               # default: 5432
  - POSTGRES_DB                 # default: pgvector
  - POSTGRES_USER               # default: pgvector
  - POSTGRES_PASSWORD           # default: pgvector

# --- Observability (Langfuse — works automatically if these are provided) ---
langfuse:
  - LANGFUSE_PUBLIC_KEY
  - LANGFUSE_SECRET_KEY
  - LANGFUSE_BASE_URL

# --- Cache (optional — only if cache.redis.enabled: true) ---
# AWS ElastiCache Serverless (Valkey engine, Redis CLI compatible).
# Uses redis-py client with TLS.
#
# Verify connectivity:
#   redis-cli --tls -h $REDIS_HOST -p $REDIS_PORT PING
#
redis:
  - REDIS_HOST               # e.g., preprod-valkey-nlb-*.elb.us-west-2.amazonaws.com
  - REDIS_PORT               # e.g., 6379
  - REDIS_TLS                # true (always TLS for AWS ElastiCache)

# --- SSL (optional — only if TLS termination is at app level) ---
ssl:
  - SSL_KEYFILE
  - SSL_CERTFILE

# --- Async Subagents (optional — one per async subagent) ---
# Convention: ASYNC_SUBAGENT_<NAME>_TOKEN
# Example: subagent named "researcher" → ASYNC_SUBAGENT_RESEARCHER_TOKEN
async_subagents:
  - ASYNC_SUBAGENT_RESEARCHER_TOKEN

# --- MCP Servers (optional — if MCP servers require auth) ---
# Set in mcp.json headers or via SSO token passthrough.
# SSO tokens are injected by the Aegra runtime from the authenticated user.
mcp:
  - MCP_AUTH_TOKEN

# ─────────────────────────────────────────────────────────────
# UI (template-ui BFF)
# ─────────────────────────────────────────────────────────────

# --- Session ---
ui_session:
  - COOKIE_SIGN              # Session cookie signing secret (min 32 chars)

# --- OAuth / SSO (only if AUTH_ENABLED=true) ---
ui_auth:
  - AUTH_ENABLED             # "true" to enable SSO
  - AUTH_CLIENT_ID
  - AUTH_CLIENT_SECRET
  - AUTH_DISCOVERY_URL        # OpenID Connect discovery endpoint

# --- UI Infrastructure Endpoints ---
ui_infrastructure:
  - AGENT_HOST               # default: http://localhost:5002
  - OTEL_EXPORTER_OTLP_ENDPOINT   # default: http://localhost:4318 (shared with agent)

# --- Build Metadata (injected by CI, not manually set) ---
ui_build:
  - APP_VERSION              # e.g., 1.2.3 (from package.json or git tag)
  - BUILD_HASH               # e.g., abc1234 (git short SHA)
  - BUILD_TIME               # e.g., 2026-05-16T01:00:00Z (ISO 8601)
