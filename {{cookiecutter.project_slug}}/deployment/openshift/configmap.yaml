apiVersion: v1
kind: ConfigMap
metadata:
  name: template-agent-config
  labels:
    app: template-agent
    component: agent
data:
  PYTHON_LOG_LEVEL: "INFO"
  USE_INMEMORY_SAVER: "false"
  LANGFUSE_TRACING_ENVIRONMENT: "production"
  # MCP servers are defined in template_agent/agent_config/mcp_servers.json
  # (baked into the image at /app/template_agent/agent_config/mcp_servers.json).
  # To override, mount a ConfigMap/Secret at a custom path and set:
  # MCP_SERVERS_CONFIG: "/app/config/mcp_servers.json"
  MCP_CONNECTION_TIMEOUT: "30"
  SSO_CALLBACK_URL: ""
